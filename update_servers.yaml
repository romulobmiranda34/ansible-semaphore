---
- name: Atualizar máquinas Ubuntu, RedHat e Suse
  hosts: all
  become: yes
  vars:
    backup_enabled: true
    reboot_after_update: true
    reboot_timeout: 600
  
  pre_tasks:
    - name: Exibir informações do sistema
      debug:
        msg: "Atualizando {{ ansible_distribution }} {{ ansible_distribution_version }} em {{ inventory_hostname }}"
    
    - name: Criar backup de configurações importantes
      block:
        - name: Backup de /etc
          shell: tar -czf /tmp/etc_backup_{{ ansible_date_time.iso8601_basic_short }}.tar.gz /etc/
          when: backup_enabled
        
        - name: Copiar backup para máquina local
          fetch:
            src: "/tmp/etc_backup_{{ ansible_date_time.iso8601_basic_short }}.tar.gz"
            dest: "/tmp/backups/{{ inventory_hostname }}/"
            flat: yes
          when: backup_enabled
      rescue:
        - name: Avisar sobre falha no backup
          debug:
            msg: "Aviso: Falha ao criar backup em {{ inventory_hostname }}"

  tasks:
    - name: Atualizar Ubuntu/Debian
      block:
        - name: Atualizar cache de pacotes
          apt:
            update_cache: yes
            cache_valid_time: 3600
        
        - name: Executar apt upgrade
          apt:
            upgrade: full
            autoclean: yes
            autoremove: yes
        
        - name: Verificar pacotes pendentes
          shell: apt list --upgradable
          register: apt_upgradable
          changed_when: false
        
        - name: Exibir pacotes pendentes
          debug:
            var: apt_upgradable.stdout
      when: ansible_os_family == "Debian"

    - name: Atualizar RedHat/CentOS/Fedora
      block:
        - name: Executar yum update
          yum:
            name: '*'
            state: latest
          when: ansible_distribution in ["CentOS", "RedHat"]
        
        - name: Executar dnf update (Fedora)
          dnf:
            name: '*'
            state: latest
          when: ansible_distribution == "Fedora"
        
        - name: Remover pacotes não utilizados
          shell: |
            yum autoremove -y 2>/dev/null || yum remove -y autoremove 2>/dev/null || true
          changed_when: false
        
        - name: Limpar cache yum
          shell: yum clean all
          changed_when: false
      when: ansible_os_family == "RedHat"

    - name: Atualizar Suse/OpenSUSE
      block:
        - name: Atualizar repositórios Zypper
          shell: zypper refresh
        
        - name: Executar zypper update
          zypper:
            name: '*'
            state: latest
        
        - name: Remover pacotes não utilizados
          shell: zypper clean
          changed_when: false
      when: ansible_os_family == "Suse"

    - name: Verificar se reinicialização é necessária
      stat:
        path: /run/reboot-required
      register: reboot_required_file
      changed_when: false

    - name: Agendar reinicialização se necessária
      block:
        - name: Avisar sobre reinicialização
          debug:
            msg: "Reinicialização necessária em {{ inventory_hostname }}"
        
        - name: Reiniciar máquina
          reboot:
            msg: "Reinicializando para aplicar atualizações do sistema..."
            reboot_timeout: "{{ reboot_timeout }}"
            pre_reboot_delay: 10
            post_reboot_delay: 30
      when: 
        - reboot_after_update
        - reboot_required_file.stat.exists or ansible_os_family == "RedHat"

  post_tasks:
    - name: Verificar saúde do sistema após atualização
      block:
        - name: Verificar status do sistema
          shell: |
            echo "=== Informações do Sistema ==="
            uname -a
            echo "=== Uptime ==="
            uptime
            echo "=== Espaço em disco ==="
            df -h
          register: system_info
          changed_when: false
        
        - name: Exibir informações do sistema
          debug:
            var: system_info.stdout_lines
        
        - name: Registrar atualização em log
          shell: |
            echo "{{ ansible_date_time.iso8601 }} - Atualização concluída em {{ inventory_hostname }}" >> /var/log/ansible_updates.log
          changed_when: false
      ignore_errors: yes

  handlers:
    - name: Reiniciar serviços críticos
      systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - ssh
        - rsyslog
      ignore_errors: yes
